# NexT 8 主题配置写在这里，不要改 node_modules 里的文件
scheme: Muse              # 单栏居中、顶部菜单、去掉常驻侧栏，最接近 Cactus 的极简观感
menu:
  home: / || fa fa-home
  archives: /archives/ || fa fa-archive
  tags: /tags/ || fa fa-tags
  categories: /categories/ || fa fa-th
  about: /about/ || fa fa-user
darkmode: true

# 侧栏头像与名字（名字取自站点 author: furadx）
avatar:
  url: /images/avatar.png
  rounded: true          # 圆形头像
  rotated: false

# 侧栏社交链接
social:
  GitHub: https://github.com/furadx || fab fa-github

# 侧栏显示：post = 打开文章时自动展开（显示文章目录 TOC）；首页等非文章页不自动展开
sidebar:
  position: left
  display: post

# 平滑翻页：开启 PJAX，切换页面时局部替换内容、不整页刷新、不闪白
pjax: true

# 代码块右上角复制按钮
codeblock:
  copy_button:
    enable: true
    show_result: true

# 回到顶部按钮显示阅读进度百分比
back2top:
  scrollpercent: true

# 站内搜索（配合 hexo-generator-searchdb）
local_search:
  enable: true

# 标签页图标（favicon）换成头像
favicon:
  small: /images/avatar.png
  medium: /images/avatar.png
  apple_touch_icon: /images/avatar.png

# 注入自定义变量与样式（借鉴 Cactus 的皮肤）——务必保留，删掉会导致自定义样式全部失效
custom_file_path:
  variable: source/_data/variables.styl
  style: source/_data/styles.styl
