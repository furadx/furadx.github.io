# 站点信息
title: furadx
subtitle: ''
description: 'furadx 的个人博客'
keywords: 'furadx, blog, 个人博客'
author: furadx
language: zh-CN
timezone: 'Asia/Shanghai'

# 网址 —— 用户主页仓库，挂根路径
url: https://furadx.github.io
root: /
permalink: :year/:month/:day/:title/

# 目录
source_dir: source
public_dir: public

# 文章
default_layout: post
titlecase: false
post_asset_folder: true      # 每篇文章配一个同名资源文件夹放图，跟着仓库走
external_link:
  enable: true
  field: site

# 分页
per_page: 10

# 主题（npm 安装，不往 themes/ 里 clone）
theme: next

# Giscus 评论（数据存于本仓库的 GitHub Discussions，由 hexo-next-giscus 插件注入）
giscus:
  enable: true
  repo: furadx/furadx.github.io
  repo_id: R_kgDOThgkkw
  category: Announcements
  category_id: DIC_kwDOThgkk84DB0fL
  mapping: pathname
  reactions_enabled: 1
  emit_metadata: 0
  theme: transparent_dark      # 背景透明，继承页面底色，与整体统一
  lang: zh-CN
  input_position: bottom
  loading: lazy

# 字数统计与阅读时长（hexo-word-counter，NexT 自动在文章 meta 显示）
symbols_count_time:
  symbols: true
  time: true
  total_symbols: true
  total_time: true
  exclude_codeblock: false
  wpm: 275

# 页面优化（hexo-optimize）：压缩 HTML / CSS / JS，加快加载
filter_optimize:
  enable: true
  css:
    minify: true
  js:
    minify: true
    remove_comments: false
  html:
    minify: true

# 站内搜索（hexo-generator-searchdb 生成 search.xml，NexT local_search 前端读取）
search:
  path: search.xml
  field: post
  content: true
  format: html

# 站点地图（SEO 收录，hexo-generator-sitemap）
sitemap:
  path: sitemap.xml

# RSS 订阅（hexo-generator-feed）
feed:
  type: atom
  path: atom.xml
  limit: 20
