# 站点信息
title: furadx
subtitle: ''
description: ''
author: furadx
language: zh-CN
timezone: 'Asia/Shanghai'

# 网址 —— 用户主页仓库，挂根路径
url: https://furadx.github.io
root: /
permalink: :year/:month/:day/:title/

# 目录
source_dir: source
public_dir: public

# 文章
default_layout: post
titlecase: false
post_asset_folder: true      # 每篇文章配一个同名资源文件夹放图，跟着仓库走
external_link:
  enable: true
  field: site

# 分页
per_page: 10

# 主题（npm 安装，不往 themes/ 里 clone）
theme: next

# Giscus 评论（数据存于本仓库的 GitHub Discussions，由 hexo-next-giscus 插件注入）
giscus:
  enable: true
  repo: furadx/furadx.github.io
  repo_id: R_kgDOThgkkw
  category: Announcements
  category_id: DIC_kwDOThgkk84DB0fL
  mapping: pathname
  reactions_enabled: 1
  emit_metadata: 0
  theme: preferred_color_scheme
  lang: zh-CN
  input_position: bottom
  loading: lazy
